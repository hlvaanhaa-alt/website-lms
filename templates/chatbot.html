{% extends "base.html" %}

{% block title %}Chatbot AI - Học Vui THCS{% endblock %}

{% block content %}
<style>
body {
    background: linear-gradient(135deg, #ffeef8 0%, #f8e8ff 50%, #ffe8f5 100%);
    min-height: 100vh;
}

.chatbot-page-container {
    width: min(96vw, 1720px);
    max-width: none;
    margin: 0 auto;
    padding: 18px 12px;
}

.chatbot-container {
    max-width: 100%;
    margin: 0 auto;
}

.chat-wrapper {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(254, 245, 255, 0.98));
    border-radius: 25px;
    box-shadow: 0 20px 60px rgba(200, 158, 245, 0.3);
    overflow: hidden;
    margin-bottom: 30px;
    border: 2px solid #ffc9e8;
}

.chat-box {
    padding: 35px;
    height: calc(100vh - 260px);
    min-height: 560px;
    overflow-y: auto;
    background: linear-gradient(180deg, #fef9ff 0%, #fdf5ff 100%);
}

.chat-box::-webkit-scrollbar {
    width: 10px;
}

.chat-box::-webkit-scrollbar-track {
    background: #fce7ff;
    border-radius: 10px;
}

.chat-box::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #d946ef, #a855f7);
    border-radius: 10px;
}

.message {
    margin-bottom: 28px;
    animation: fadeIn 0.4s ease-out;
    max-width: 80%;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message-header {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 10px;
}

.message-content {
    padding: 18px 24px;
    border-radius: 20px;
    line-height: 1.8;
    word-wrap: break-word;
    font-size: 1.05rem;
}

.message-content .katex {
    font-size: 1.15em;
}

.message-content .katex-display {
    margin: 1.2em 0;
    overflow-x: auto;
    padding: 10px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 10px;
}

.message-image {
    max-width: 300px;
    border-radius: 12px;
    margin-top: 10px;
    border: 2px solid rgba(255, 255, 255, 0.5);
}

.diagram-wrapper {
    position: relative;
    margin: 15px 0;
}

.diagram-container {
    background: white;
    padding: 20px;
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid #ffc9e8;
    box-shadow: 0 4px 15px rgba(217, 70, 239, 0.15);
}

.diagram-container svg {
    max-width: 100%;
    height: auto;
}

.mermaid {
    background: white;
    padding: 20px;
    border-radius: 15px;
    border: 2px solid #ffc9e8;
}

.download-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 8px 16px;
    background: linear-gradient(135deg, #d946ef, #a855f7);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 10;
}

.download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(217, 70, 239, 0.5);
}

.user-message {
    margin-left: auto;
    text-align: right;
}

.user-message .message-header {
    color: #d946ef;
}

.user-message .message-content {
    background: linear-gradient(135deg, #d946ef, #a855f7);
    color: white;
    border-radius: 20px 20px 5px 20px;
    box-shadow: 0 6px 20px rgba(217, 70, 239, 0.4);
}

.bot-message {
    margin-right: auto;
}

.bot-message .message-header {
    color: #7c3aed;
}

.bot-message .message-content {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 250, 255, 0.95));
    color: #4a044e;
    border: 2px solid #ffc9e8;
    border-radius: 20px 20px 20px 5px;
    box-shadow: 0 6px 20px rgba(255, 201, 232, 0.3);
}

.loading .message-content::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d946ef;
    animation: pulse 1.5s infinite;
    margin-left: 8px;
}

@keyframes pulse {
    0%, 100% {
        opacity: 0.3;
    }
    50% {
        opacity: 1;
        transform: scale(1.3);
    }
}

.chat-input-container {
    padding: 28px 35px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(254, 250, 255, 0.95));
    border-top: 2px solid #ffc9e8;
}

.input-wrapper {
    display: flex;
    gap: 15px;
    align-items: flex-end;
}

.text-input-group {
    flex: 1;
    position: relative;
}

.chat-input-container input[type="text"] {
    width: 100%;
    padding: 18px 60px 18px 24px;
    border: 2px solid #ffc9e8;
    border-radius: 20px;
    font-size: 1.05rem;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.8);
}

.chat-input-container input[type="text"]:focus {
    outline: none;
    border-color: #d946ef;
    background: white;
    box-shadow: 0 0 0 4px rgba(217, 70, 239, 0.1);
}

.image-upload-btn {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: linear-gradient(135deg, #d946ef, #a855f7);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.3s ease;
}

.image-upload-btn:hover {
    transform: translateY(-50%) scale(1.1);
    box-shadow: 0 4px 12px rgba(217, 70, 239, 0.4);
}

.image-preview {
    position: absolute;
    bottom: 100%;
    left: 0;
    margin-bottom: 10px;
    background: white;
    border: 2px solid #ffc9e8;
    border-radius: 12px;
    padding: 8px;
    box-shadow: 0 4px 15px rgba(217, 70, 239, 0.2);
}

.image-preview img {
    max-width: 150px;
    max-height: 150px;
    border-radius: 8px;
    display: block;
}

.remove-image-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: #d946ef;
    color: white;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    transition: all 0.3s ease;
}

.remove-image-btn:hover {
    background: #a855f7;
    transform: scale(1.1);
}

.btn-primary {
    padding: 18px 40px;
    background: linear-gradient(135deg, #d946ef, #a855f7);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
}

.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(169, 85, 247, 0.6);
}

.suggestions {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(254, 245, 255, 0.98));
    border-radius: 25px;
    padding: 35px;
    box-shadow: 0 15px 50px rgba(200, 158, 245, 0.25);
    border: 2px solid #ffc9e8;
}

.suggestions-header {
    font-size: 1.3rem;
    font-weight: 700;
    color: #7c3aed;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 3px solid #ffc9e8;
}

.suggestions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
}

.suggestion-btn {
    padding: 18px 24px;
    background: linear-gradient(135deg, rgba(255, 249, 255, 0.8), rgba(253, 245, 255, 0.8));
    border: 2px solid #ffc9e8;
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
}

.suggestion-text {
    color: #7c3aed;
    font-size: 1rem;
    font-weight: 600;
}

.suggestion-btn:hover {
    background: linear-gradient(135deg, #d946ef, #a855f7);
    border-color: transparent;
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(217, 70, 239, 0.4);
}

.suggestion-btn:hover .suggestion-text {
    color: white;
}

.quiz-card {
    margin-top: 16px;
    border: 2px solid #e9d5ff;
    border-radius: 16px;
    background: #ffffff;
    overflow: hidden;
}

.quiz-title {
    padding: 16px 18px;
    background: linear-gradient(135deg, #7c3aed, #d946ef);
    color: #ffffff;
    font-weight: 700;
}

.quiz-body {
    padding: 18px;
}

.quiz-question {
    padding: 16px 0;
    border-bottom: 1px solid #f3e8ff;
}

.quiz-question:last-child {
    border-bottom: 0;
}

.quiz-question-text {
    font-weight: 700;
    color: #4a044e;
    margin-bottom: 12px;
}

.quiz-options {
    display: grid;
    gap: 10px;
}

.quiz-option {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 11px 12px;
    border: 1px solid #e9d5ff;
    border-radius: 12px;
    background: #fdf4ff;
    cursor: pointer;
}

.quiz-option input {
    margin-top: 5px;
}

.quiz-option.correct {
    border-color: #22c55e;
    background: #ecfdf5;
}

.quiz-option.incorrect {
    border-color: #ef4444;
    background: #fef2f2;
}

.quiz-explanation {
    display: none;
    margin-top: 10px;
    padding: 12px;
    border-left: 4px solid #7c3aed;
    background: #faf5ff;
    border-radius: 10px;
    color: #581c87;
}

.quiz-result {
    display: none;
    margin: 16px 0;
    padding: 14px;
    border-radius: 12px;
    background: #f0fdf4;
    color: #166534;
    font-weight: 700;
}

.quiz-submit {
    margin-top: 16px;
    padding: 12px 22px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #7c3aed, #d946ef);
    color: #ffffff;
    font-weight: 700;
    cursor: pointer;
}

.quiz-submit:disabled {
    opacity: 0.65;
    cursor: default;
}

@media (max-width: 768px) {
    .chatbot-page-container {
        width: 100%;
        padding: 12px 10px;
    }

    .chat-box {
        height: calc(100vh - 245px);
        min-height: 350px;
        padding: 20px;
    }
    
    .message {
        max-width: 90%;
    }

    .message-content {
        padding: 14px 18px;
        font-size: 1rem;
    }
    
    .suggestions-grid {
        grid-template-columns: 1fr;
    }

    .chat-input-container {
        padding: 20px;
    }

    .input-wrapper {
        flex-direction: column;
        gap: 10px;
    }

    .chat-input-container input[type="text"] {
        padding: 14px 50px 14px 18px;
        font-size: 1rem;
    }

    .btn-primary {
        width: 100%;
        padding: 14px 28px;
        font-size: 1rem;
    }
}
</style>

<script>
let selectedImage = null;
const quizStore = {};
const quizMessageMap = {};

// ============== IMAGE HANDLING ==============
function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const validTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/gif', 'image/webp'];
    if (!validTypes.includes(file.type)) {
        alert('Chỉ chấp nhận ảnh: PNG, JPG, JPEG, GIF, WEBP');
        return;
    }
    
    if (file.size > 10 * 1024 * 1024) {
        alert('Ảnh quá lớn. Tối đa 10MB');
        return;
    }
    
    selectedImage = file;
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('imagePreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
}

function removeImage() {
    selectedImage = null;
    document.getElementById('imageInput').value = '';
    document.getElementById('imagePreview').style.display = 'none';
}

// ============== SEND MESSAGE ==============
async function sendMessage(event) {
    event.preventDefault();
    
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    
    if (!message && !selectedImage) {
        alert('Vui lòng nhập tin nhắn hoặc gửi ảnh');
        return;
    }
    
    // Luôn dùng FormData để tương thích với backend
    const formData = new FormData();
    formData.append('message', message || '');
    if (selectedImage) {
        formData.append('image', selectedImage);
    }
    
    addMessage(message || '[Đã gửi ảnh]', 'user', selectedImage);
    
    input.value = '';
    removeImage();
    
    const loadingId = addMessage('Đang phân tích...', 'bot', null, true);
    
    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            body: formData
            // Không set Content-Type, để browser tự set cho FormData
        });

        const data = await response.json();
        removeMessage(loadingId);

        if (!response.ok) {
            addMessage(data.details || data.error || `Lỗi HTTP ${response.status}. Vui lòng thử lại.`, 'bot');
            return;
        }

        if (!data.success) {
            addMessage(data.details || data.error || 'Có lỗi xảy ra', 'bot');
            return;
        }
        
        if (data.quiz) {
            addQuizMessage(data.response, data.quiz, data.chat_message_id);
        } else if (data.processed) {
            addMessageWithDiagrams(data.response, data.processed);
        } else {
            addMessage(data.response, 'bot');
        }
        
    } catch (error) {
        removeMessage(loadingId);
        addMessage('Xin lỗi, có lỗi xảy ra. Vui lòng thử lại!', 'bot');
        console.error('Error:', error);
    }
}

// ============== FORMAT TEXT ==============
function normalizeLatexText(text) {
    return String(text || '')
        .replace(/\\r\\n/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\\\\(?=(begin|end|frac|dfrac|sqrt|left|right|cdot|times|le|ge|ne|infty|sum|int|alpha|beta|gamma|theta|pi|Delta|Omega)\b)/g, '\\');
}

function formatText(text) {
    text = normalizeLatexText(text);
    const latexBlocks = [];
    let index = 0;
    
    text = text.replace(/\$\$([\s\S]*?)\$\$/g, (match) => {
        const placeholder = `__LATEX_BLOCK_${index}__`;
        latexBlocks.push({ placeholder, content: match });
        index++;
        return placeholder;
    });
    
    text = text.replace(/\$([^\$\n]+?)\$/g, (match) => {
        const placeholder = `__LATEX_INLINE_${index}__`;
        latexBlocks.push({ placeholder, content: match });
        index++;
        return placeholder;
    });
    
    text = text.replace(/```[\s\S]*?```/g, '');
    text = text.replace(/\*\*([^\*]+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');
    text = text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
    text = text.replace(/^# (.*$)/gim, '<h1>$1</h1>');
    text = text.replace(/\n/g, '<br>');
    
    latexBlocks.forEach(({ placeholder, content }) => {
        text = text.replace(placeholder, content);
    });
    
    return text;
}

function escapeHTML(value) {
    return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function formatQuizText(text) {
    const normalized = String(text || '')
        .replace(/\\r\\n/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n');
    return formatText(escapeHTML(normalized));
}

function renderMathInNode(node) {
    if (typeof renderMathInElement === 'undefined') return;
    try {
        renderMathInElement(node, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '\\[', right: '\\]', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false}
            ],
            throwOnError: false,
            trust: true,
            strict: false
        });
    } catch (e) {
        console.error('LaTeX render error:', e);
    }
}

document.addEventListener('DOMContentLoaded', loadChatHistory);

async function loadChatHistory() {
    try {
        const response = await fetch('/api/chat/history');
        if (!response.ok) return;

        const data = await response.json();
        if (!data.success || !Array.isArray(data.messages) || data.messages.length === 0) {
            return;
        }

        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = '';

        data.messages.forEach(message => {
            addMessage(message.content || '', 'user');

            if (message.quiz) {
                addQuizMessage(message.response || '', message.quiz, message.id, message.quiz_result);
            } else if (message.processed) {
                addMessageWithDiagrams(message.response || '', message.processed);
            } else if (message.response) {
                addMessage(message.response, 'bot');
            }
        });
    } catch (error) {
        console.error('Load chat history error:', error);
    }
}

// ============== ADD MESSAGE ==============
function addMessage(text, sender, imageFile = null, isLoading = false) {
    const chatBox = document.getElementById('chatBox');
    const messageDiv = document.createElement('div');
    const messageId = 'msg-' + Date.now();
    
    messageDiv.id = messageId;
    messageDiv.className = `message ${sender}-message ${isLoading ? 'loading' : ''}`;
    
    const formattedText = formatText(escapeHTML(text));
    let imageHTML = '';
    
    if (imageFile && sender === 'user') {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = messageDiv.querySelector('.message-image');
            if (img) img.src = e.target.result;
        };
        reader.readAsDataURL(imageFile);
        imageHTML = '<img class="message-image" src="" alt="Uploaded image">';
    }
    
    messageDiv.innerHTML = `
        <div class="message-header">${sender === 'user' ? 'Bạn' : 'AI Assistant'}</div>
        <div class="message-content">
            <div>${formattedText}</div>
            ${imageHTML}
        </div>
    `;
    
    chatBox.appendChild(messageDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
    
    if (!isLoading && sender === 'bot') {
        setTimeout(() => {
            if (typeof renderMathInElement !== 'undefined') {
                try {
                    renderMathInElement(messageDiv, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '\\[', right: '\\]', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false}
                        ],
                        throwOnError: false,
                        trust: true,
                        strict: false
                    });
                } catch (e) {
                    console.error('LaTeX render error:', e);
                }
            }
        }, 150);
    }
    
    return messageId;
}

// ============== ADD MESSAGE WITH DIAGRAMS ==============
function addMessageWithDiagrams(fullResponse, processed) {
    const chatBox = document.getElementById('chatBox');
    const messageDiv = document.createElement('div');
    const messageId = 'msg-' + Date.now();
    
    messageDiv.id = messageId;
    messageDiv.className = 'message bot-message';
    
    let contentHTML = '<div class="message-header">AI Assistant</div><div class="message-content"><div>';
    
    if (processed.text) {
        contentHTML += formatText(escapeHTML(processed.text));
    }
    
    if (processed.svgs && processed.svgs.length > 0) {
        processed.svgs.forEach((svg, index) => {
            const svgId = `svg-${Date.now()}-${index}`;
            contentHTML += `
                <div class="diagram-wrapper">
                    <button class="download-btn" onclick="downloadSVG('${svgId}', 'diagram-${index + 1}.png')">Tải về PNG</button>
                    <div class="diagram-container" id="${svgId}">${svg}</div>
                </div>
            `;
        });
    }
    
    if (processed.mermaids && processed.mermaids.length > 0) {
        processed.mermaids.forEach((mermaid, index) => {
            const mermaidId = `mermaid-${Date.now()}-${index}`;
            contentHTML += `
                <div class="diagram-wrapper">
                    <button class="download-btn" onclick="downloadMermaid('${mermaidId}', 'sodo-${index + 1}.png')">Tải về PNG</button>
                    <div class="mermaid" id="${mermaidId}">${mermaid}</div>
                </div>
            `;
        });
    }
    
    contentHTML += '</div></div>';
    messageDiv.innerHTML = contentHTML;
    
    chatBox.appendChild(messageDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
    
    setTimeout(() => {
        if (typeof renderMathInElement !== 'undefined') {
            try {
                renderMathInElement(messageDiv, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false,
                    trust: true,
                    strict: false
                });
            } catch (e) {
                console.error('LaTeX render error:', e);
            }
        }
        
        if (processed.mermaids && processed.mermaids.length > 0) {
            const mermaidElements = messageDiv.querySelectorAll('.mermaid');
            mermaidElements.forEach(element => {
                try {
                    mermaid.run({ nodes: [element] });
                } catch (e) {
                    console.error('Mermaid render error:', e);
                }
            });
        }
    }, 150);
    
    return messageId;
}

// ============== INTERACTIVE QUIZ ==============
function addQuizMessage(introText, quiz, chatMessageId = null, savedResult = null) {
    const chatBox = document.getElementById('chatBox');
    const messageDiv = document.createElement('div');
    const messageId = 'quiz-' + (chatMessageId || Date.now());
    quizStore[messageId] = quiz;
    if (chatMessageId) {
        quizMessageMap[messageId] = chatMessageId;
    }

    messageDiv.id = messageId;
    messageDiv.className = 'message bot-message';

    const questionsHTML = (quiz.questions || []).map((question, questionIndex) => {
        const optionsHTML = (question.options || []).map((option, optionIndex) => `
            <label class="quiz-option" data-question-index="${questionIndex}" data-option-index="${optionIndex}">
                <input type="radio" name="${messageId}-q-${questionIndex}" value="${optionIndex}">
                <span>${String.fromCharCode(65 + optionIndex)}. ${formatQuizText(option)}</span>
            </label>
        `).join('');

        return `
            <div class="quiz-question" data-question-index="${questionIndex}">
                <div class="quiz-question-text">Câu ${questionIndex + 1}. ${formatQuizText(question.question)}</div>
                <div class="quiz-options">${optionsHTML}</div>
                <div class="quiz-explanation" id="${messageId}-explain-${questionIndex}">
                    ${formatQuizText(question.explanation || '')}
                </div>
            </div>
        `;
    }).join('');

    messageDiv.innerHTML = `
        <div class="message-header">AI Assistant</div>
        <div class="message-content">
            <div>${formatQuizText(introText || '')}</div>
            <div class="quiz-card">
                <div class="quiz-title">${formatQuizText(quiz.title || 'Trắc nghiệm Toán')}</div>
                <div class="quiz-body">
                    ${questionsHTML}
                    <div class="quiz-result" id="${messageId}-result"></div>
                    <button class="quiz-submit" onclick="submitQuiz('${messageId}')">Nộp bài</button>
                </div>
            </div>
        </div>
    `;

    chatBox.appendChild(messageDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
    if (savedResult) {
        applyQuizResult(messageId, savedResult);
    }
    setTimeout(() => renderMathInNode(messageDiv), 150);
    return messageId;
}

function collectQuizAnswers(messageId, questions) {
    const messageDiv = document.getElementById(messageId);
    return questions.map((_question, questionIndex) => {
        const selected = messageDiv.querySelector(`input[name="${messageId}-q-${questionIndex}"]:checked`);
        return selected ? Number(selected.value) : null;
    });
}

function applyQuizResult(messageId, quizResult) {
    const quiz = quizStore[messageId];
    const messageDiv = document.getElementById(messageId);
    if (!quiz || !messageDiv) return;

    const questions = quiz.questions || [];
    const resultAnswers = quizResult.answers || [];

    questions.forEach((question, questionIndex) => {
        const answerInfo = resultAnswers[questionIndex] || {};
        const selectedIndex = answerInfo.answer;
        const correctIndex = Number(question.correct_index);
        const selectedInput = selectedIndex === null || selectedIndex === undefined
            ? null
            : messageDiv.querySelector(`input[name="${messageId}-q-${questionIndex}"][value="${selectedIndex}"]`);
        if (selectedInput) selectedInput.checked = true;

        const optionLabels = messageDiv.querySelectorAll(`.quiz-option[data-question-index="${questionIndex}"]`);

        optionLabels.forEach(label => {
            const optionIndex = Number(label.dataset.optionIndex);
            label.classList.remove('correct', 'incorrect');
            if (optionIndex === correctIndex) {
                label.classList.add('correct');
            }
        });

        if (selectedIndex !== null && selectedIndex !== undefined && Number(selectedIndex) !== correctIndex) {
            const selectedLabel = messageDiv.querySelector(
                `.quiz-option[data-question-index="${questionIndex}"][data-option-index="${selectedIndex}"]`
            );
            if (selectedLabel) selectedLabel.classList.add('incorrect');
        }

        const explanation = document.getElementById(`${messageId}-explain-${questionIndex}`);
        if (explanation) explanation.style.display = 'block';
    });

    const result = document.getElementById(`${messageId}-result`);
    const score = Number(quizResult.score || 0);
    const total = Number(quizResult.total || questions.length);
    const percent = Number(quizResult.percent || 0);
    if (result) {
        result.style.display = 'block';
        result.textContent = `Kết quả: ${score}/${total} câu đúng (${percent}%).`;
    }

    messageDiv.querySelectorAll('input[type="radio"]').forEach(input => {
        input.disabled = true;
    });
    const submitButton = messageDiv.querySelector('.quiz-submit');
    if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = 'Đã nộp bài';
    }

    renderMathInNode(messageDiv);
    messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function submitQuiz(messageId) {
    const quiz = quizStore[messageId];
    const messageDiv = document.getElementById(messageId);
    if (!quiz || !messageDiv) return;

    const questions = quiz.questions || [];
    const answers = collectQuizAnswers(messageId, questions);
    const answered = answers.filter(answer => answer !== null).length;

    if (answered < questions.length) {
        const confirmSubmit = confirm(`Bạn mới trả lời ${answered}/${questions.length} câu. Vẫn nộp bài?`);
        if (!confirmSubmit) return;
    }

    let quizResult = null;
    const chatMessageId = quizMessageMap[messageId];
    if (chatMessageId) {
        try {
            const response = await fetch('/api/chat/quiz-submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    message_id: chatMessageId,
                    answers: answers
                })
            });
            const data = await response.json();
            if (data.success && data.quiz_result) {
                quizResult = data.quiz_result;
            }
        } catch (error) {
            console.error('Save quiz result error:', error);
        }
    }

    if (!quizResult) {
        let score = 0;
        const resultAnswers = questions.map((question, index) => {
            const correctIndex = Number(question.correct_index);
            const answer = answers[index];
            const isCorrect = answer === correctIndex;
            if (isCorrect) score += 1;
            return {answer, correct_index: correctIndex, is_correct: isCorrect};
        });
        quizResult = {
            answers: resultAnswers,
            score,
            total: questions.length,
            percent: questions.length ? Math.round((score / questions.length) * 100) : 0
        };
    }

    applyQuizResult(messageId, quizResult);
}

// ============== UTILITY FUNCTIONS ==============
function removeMessage(messageId) {
    const message = document.getElementById(messageId);
    if (message) message.remove();
}

function quickQuestion(question) {
    document.getElementById('messageInput').value = question;
    document.getElementById('chatForm').dispatchEvent(new Event('submit'));
}

function downloadSVG(elementId, filename) {
    const svgElement = document.getElementById(elementId).querySelector('svg');
    if (!svgElement) return;
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    const svgWidth = svgElement.width.baseVal.value || 500;
    const svgHeight = svgElement.height.baseVal.value || 500;
    
    canvas.width = svgWidth * 2;
    canvas.height = svgHeight * 2;
    
    const svgData = new XMLSerializer().serializeToString(svgElement);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    
    const img = new Image();
    img.onload = function() {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(function(blob) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(url);
        });
    };
    img.src = url;
}

function downloadMermaid(elementId, filename) {
    const element = document.getElementById(elementId);
    if (!element) return;
    
    const svgElement = element.querySelector('svg');
    if (!svgElement) {
        alert('Vui lòng đợi sơ đồ render xong!');
        return;
    }
    
    downloadSVG(elementId, filename);
}
