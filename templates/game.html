<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Giải Trí - Học Vui THCS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Thanh menu trên cùng */
        .game-nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .game-nav-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #00e5ff;
            letter-spacing: 1px;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            text-decoration: none;
        }

        .btn-restart {
            background: linear-gradient(135deg, #00e5ff, #0091ea);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
            color: white;
            text-decoration: none;
        }

        /* Khu vực game */
        .game-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        #game-container {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00e5ff, #00b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #timer {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #ff8a65;
            font-weight: 700;
            background: rgba(255, 138, 101, 0.15);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 25px;
            border: 1px solid rgba(255, 138, 101, 0.3);
        }

        #timer.urgent {
            color: #ff3d00;
            animation: pulse-timer 0.8s infinite;
            background: rgba(255, 61, 0, 0.2);
            border-color: rgba(255, 61, 0, 0.4);
        }

        @keyframes pulse-timer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .question-box {
            margin: 24px 0;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            line-height: 1.6;
            margin-bottom: 24px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .option {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 18px 14px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.25s;
            line-height: 1.4;
        }

        .option:hover {
            background: linear-gradient(135deg, #00b0ff, #0091ea);
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 176, 255, 0.35);
        }

        .option.correct {
            background: linear-gradient(135deg, #00c853, #64dd17);
            border-color: transparent;
        }

        .option.wrong {
            background: linear-gradient(135deg, #d50000, #ff1744);
            border-color: transparent;
        }

        .score {
            font-size: 1.1rem;
            font-weight: 700;
            color: #00e5ff;
            margin-top: 20px;
            padding: 10px 24px;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 25px;
            display: inline-block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00e5ff, #00b0ff);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .question-number {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .result-box {
            text-align: center;
        }

        .result-box h3 {
            font-size: 2rem;
            color: #00e5ff;
            margin-bottom: 20px;
        }

        .result-score-big {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00e5ff, #00b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn-result {
            padding: 12px 28px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-leaderboard {
            background: linear-gradient(135deg, #ffd600, #ff8f00);
            color: #1a1a1a;
        }

        .btn-replay {
            background: linear-gradient(135deg, #00e5ff, #0091ea);
            color: white;
        }

        .btn-gohome {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-result:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 600px) {
            .options-container { grid-template-columns: 1fr; }
            h2 { font-size: 1.5rem; }
            #game-container { padding: 24px 20px; }
            .result-score-big { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <!-- Menu điều hướng -->
    <nav class="game-nav">
        <span class="game-nav-title">🎮 Game Giải Trí</span>
        <div class="nav-actions">
            <a href="/student/dashboard" class="btn-home">🏠 Trang chủ</a>
            <a href="/enter_nickname" class="btn-restart">🔁 Chơi lại</a>
        </div>
    </nav>

    <div class="game-wrapper">
        <div id="game-container">
            <h2>Game Giải Trí</h2>
            <div id="timer">⏱ Thời gian: 20s</div>
            <div id="question-box">
                <div class="question-text">Đang tải câu hỏi...</div>
            </div>
            <div class="score" id="score-box">⭐ Điểm: 0</div>
        </div>
    </div>

    <script>
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let countdown;
        let timeLeft = 20;
        let answered = false;

        async function loadQuestions() {
            try {
                const res = await fetch("/get_questions");
                questions = await res.json();

                if (!questions || questions.length === 0) {
                    document.getElementById("question-box").innerHTML = "<p class='question-text'>❌ Không có câu hỏi nào.</p>";
                    return;
                }

                showQuestion();
            } catch (err) {
                document.getElementById("question-box").innerHTML = "<p class='question-text'>❌ Lỗi khi tải câu hỏi.</p>";
                console.error(err);
            }
        }

        function startTimer() {
            timeLeft = 20;
            answered = false;
            const timerEl = document.getElementById("timer");
            timerEl.className = '';
            timerEl.textContent = `⏱ Thời gian: ${timeLeft}s`;

            countdown = setInterval(() => {
                timeLeft--;
                timerEl.textContent = `⏱ Thời gian: ${timeLeft}s`;

                if (timeLeft <= 5) {
                    timerEl.classList.add('urgent');
                }

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    if (!answered) {
                        // Highlight đáp án đúng khi hết giờ
                        const q = questions[currentIndex];
                        document.querySelectorAll('.option').forEach(btn => {
                            if (btn.textContent === q.answer) btn.classList.add('correct');
                        });
                        setTimeout(() => {
                            currentIndex++;
                            showQuestion();
                        }, 1000);
                    }
                }
            }, 1000);
        }

        function showQuestion() {
            if (currentIndex >= questions.length) {
                clearInterval(countdown);
                fetch("/submit_score", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ score })
                }).then(() => {
                    document.getElementById("game-container").innerHTML = `
                        <div class="result-box">
                            <h3>🎉 Hoàn Thành!</h3>
                            <div class="result-score-big">${score}<span style="font-size:2rem; color:rgba(255,255,255,0.6)">/${questions.length}</span></div>
                            <p style="color:rgba(255,255,255,0.7); margin-top:12px; font-size:1.1rem;">
                                Chính xác: ${Math.round(score/questions.length*100)}%
                            </p>
                            <div class="result-actions">
                                <a href="/leaderboard" class="btn-result btn-leaderboard">🏆 Bảng vinh danh</a>
                                <a href="/enter_nickname" class="btn-result btn-replay">🔁 Chơi lại</a>
                                <a href="/student/dashboard" class="btn-result btn-gohome">🏠 Trang chủ</a>
                            </div>
                        </div>
                    `;
                });
                return;
            }

            clearInterval(countdown);
            startTimer();

            const q = questions[currentIndex];
            const total = questions.length;
            const progress = Math.round((currentIndex / total) * 100);

            const box = document.getElementById("question-box");
            box.innerHTML = `
                <div class="question-number">Câu ${currentIndex + 1} / ${total}</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                <p class="question-text">${q.question}</p>
                <div class="options-container"></div>
            `;

            const optionsContainer = box.querySelector(".options-container");
            q.options.forEach(opt => {
                const btn = document.createElement("div");
                btn.className = "option";
                btn.textContent = opt;
                btn.onclick = () => {
                    if (answered) return;
                    answered = true;
                    clearInterval(countdown);

                    if (opt === q.answer) {
                        score++;
                        btn.classList.add('correct');
                        document.getElementById("score-box").textContent = `⭐ Điểm: ${score}`;
                    } else {
                        btn.classList.add('wrong');
                        // Highlight đáp án đúng
                        optionsContainer.querySelectorAll('.option').forEach(b => {
                            if (b.textContent === q.answer) b.classList.add('correct');
                        });
                    }

                    setTimeout(() => {
                        currentIndex++;
                        showQuestion();
                    }, 900);
                };
                optionsContainer.appendChild(btn);
            });
        }

        loadQuestions();
    </script>
</body>
</html>
