<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ topic.title }} - Game EduPath</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(145deg, rgba(9, 28, 42, .96), rgba(30, 73, 90, .92)),
                #102033;
            color: #fff;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .game-nav {
            align-items: center;
            background: rgba(255,255,255,.08);
            border-bottom: 1px solid rgba(255,255,255,.14);
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 22px;
        }
        .game-nav strong {
            color: #6ee7ff;
            letter-spacing: .02em;
        }
        .nav-actions {
            display: flex;
            gap: 10px;
        }
        .nav-actions a {
            border: 1px solid rgba(255,255,255,.26);
            border-radius: 999px;
            color: #fff;
            font-weight: 800;
            padding: 8px 14px;
            text-decoration: none;
        }
        .game-wrapper {
            align-items: center;
            display: flex;
            justify-content: center;
            min-height: calc(100vh - 70px);
            padding: 28px 16px;
        }
        #game-container {
            width: min(820px, 100%);
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 22px;
            box-shadow: 0 24px 80px rgba(0,0,0,.34);
            padding: clamp(22px, 4vw, 38px);
            text-align: center;
        }
        .topic-kicker {
            color: #9ee8dc;
            font-weight: 900;
            margin: 0 0 8px;
        }
        h1 {
            color: #6ee7ff;
            font-size: clamp(1.7rem, 4vw, 2.5rem);
            margin: 0 0 6px;
        }
        .player-line {
            color: rgba(255,255,255,.7);
            margin-bottom: 24px;
        }
        .timer-row {
            align-items: center;
            display: grid;
            gap: 12px;
            margin-bottom: 18px;
        }
        #timerText {
            color: #ffb38a;
            font-weight: 900;
        }
        .time-grid {
            display: grid;
            grid-template-columns: repeat(20, minmax(0, 1fr));
            gap: 4px;
        }
        .time-cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,.13);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 4px;
            transition: background .2s ease, transform .2s ease;
        }
        .time-cell.active {
            background: linear-gradient(135deg, #4dd7ff, #65f2c2);
            transform: translateY(-1px);
        }
        .time-cell.warning.active {
            background: linear-gradient(135deg, #ffbf69, #ff6b6b);
        }
        .question-number {
            color: rgba(255,255,255,.62);
            font-weight: 800;
            margin-bottom: 12px;
        }
        .question-text {
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 16px;
            font-size: 1.24rem;
            font-weight: 800;
            line-height: 1.55;
            margin: 0 0 18px;
            padding: 22px;
        }
        .options-container {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .option {
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 850;
            line-height: 1.35;
            min-height: 62px;
            padding: 14px;
            transition: transform .18s ease, background .18s ease;
        }
        .option:hover {
            background: rgba(77,215,255,.22);
            transform: translateY(-2px);
        }
        .option.correct { background: #10b981; border-color: #10b981; }
        .option.wrong { background: #ef4444; border-color: #ef4444; }
        .score {
            background: rgba(77,215,255,.14);
            border: 1px solid rgba(77,215,255,.28);
            border-radius: 999px;
            color: #6ee7ff;
            display: inline-flex;
            font-weight: 900;
            margin-top: 20px;
            padding: 10px 18px;
        }
        .result-box h2 {
            color: #6ee7ff;
            font-size: 2.2rem;
            margin: 0 0 12px;
        }
        .result-score-big {
            color: #fff;
            font-size: 4rem;
            font-weight: 950;
        }
        .result-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 22px;
        }
        .result-actions a {
            border-radius: 999px;
            color: #102033;
            background: #6ee7ff;
            font-weight: 900;
            padding: 11px 18px;
            text-decoration: none;
        }
        .result-actions a.secondary {
            background: rgba(255,255,255,.14);
            border: 1px solid rgba(255,255,255,.24);
            color: #fff;
        }
        @media (max-width: 620px) {
            .options-container { grid-template-columns: 1fr; }
            .game-nav { align-items: flex-start; flex-direction: column; }
            .time-grid { gap: 3px; }
        }
    </style>
</head>
<body>
    <nav class="game-nav">
        <strong>🎮 EduPath Game</strong>
        <div class="nav-actions">
            <a href="{{ url_for('enter_nickname') }}">Sảnh game</a>
            <a href="{{ url_for('student_dashboard') }}">Dashboard</a>
        </div>
    </nav>

    <main class="game-wrapper">
        <section id="game-container">
            <p class="topic-kicker">{{ topic.grade }}</p>
            <h1>{{ topic.title }}</h1>
            <div class="player-line">Người chơi: {{ username }}</div>
            <div class="timer-row">
                <div id="timerText">20 giây</div>
                <div class="time-grid" id="timeGrid"></div>
            </div>
            <div id="question-box">
                <p class="question-text">Đang tải câu hỏi...</p>
            </div>
            <div class="score" id="score-box">Điểm: 0</div>
        </section>
    </main>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']],
                processEscapes: true
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let countdown;
        let timeLeft = 20;
        let answered = false;
        const maxTime = 20;
        const topicGrade = {{ topic.grade|tojson }};
        const topicTitle = {{ topic.title|tojson }};
        const playerName = {{ username|tojson }};

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value ?? '';
            return div.innerHTML;
        }

        function renderMath(container = document) {
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([container]).catch(console.error);
            }
        }

        function buildTimeGrid() {
            const grid = document.getElementById('timeGrid');
            grid.innerHTML = '';
            for (let i = 0; i < maxTime; i += 1) {
                const cell = document.createElement('span');
                cell.className = 'time-cell active';
                grid.appendChild(cell);
            }
        }

        function updateTimerCells() {
            const cells = document.querySelectorAll('.time-cell');
            cells.forEach((cell, index) => {
                cell.classList.toggle('active', index < timeLeft);
                cell.classList.toggle('warning', timeLeft <= 5);
            });
            document.getElementById('timerText').textContent = `${timeLeft} giây`;
        }

        async function loadQuestions() {
            try {
                const res = await fetch("{{ url_for('get_questions') }}");
                questions = await res.json();
                if (!questions || questions.length === 0) {
                    document.getElementById("question-box").innerHTML = "<p class='question-text'>Chủ đề này chưa có câu hỏi.</p>";
                    return;
                }
                buildTimeGrid();
                showQuestion();
            } catch (err) {
                document.getElementById("question-box").innerHTML = "<p class='question-text'>Lỗi khi tải câu hỏi.</p>";
                console.error(err);
            }
        }

        function startTimer() {
            timeLeft = maxTime;
            answered = false;
            updateTimerCells();
            countdown = setInterval(() => {
                timeLeft -= 1;
                updateTimerCells();
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    if (!answered) {
                        revealAnswer();
                        setTimeout(nextQuestion, 900);
                    }
                }
            }, 1000);
        }

        function revealAnswer() {
            const q = questions[currentIndex];
            document.querySelectorAll('.option').forEach(btn => {
                if (btn.dataset.value === q.answer) btn.classList.add('correct');
            });
        }

        function nextQuestion() {
            currentIndex += 1;
            showQuestion();
        }

        function finishGame() {
            clearInterval(countdown);
            fetch("{{ url_for('submit_score') }}", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({score, total: questions.length})
            }).finally(() => {
                const percent = questions.length ? Math.round(score / questions.length * 100) : 0;
                document.getElementById("game-container").innerHTML = `
                    <div class="result-box">
                        <p class="topic-kicker">${escapeHtml(topicGrade)} · ${escapeHtml(topicTitle)}</p>
                        <h2>Hoàn thành</h2>
                        <div class="result-score-big">${score}/${questions.length}</div>
                        <p class="player-line">Độ chính xác: ${percent}% · Người chơi: ${escapeHtml(playerName)}</p>
                        <div class="result-actions">
                            <a href="{{ url_for('leaderboard') }}">Bảng xếp hạng</a>
                            <a href="{{ url_for('enter_nickname') }}" class="secondary">Chơi chủ đề khác</a>
                            <a href="{{ url_for('student_dashboard') }}" class="secondary">Dashboard</a>
                        </div>
                    </div>
                `;
            });
        }

        function showQuestion() {
            if (currentIndex >= questions.length) {
                finishGame();
                return;
            }
            clearInterval(countdown);
            startTimer();

            const q = questions[currentIndex];
            const box = document.getElementById("question-box");
            box.innerHTML = `
                <div class="question-number">Câu ${currentIndex + 1} / ${questions.length}</div>
                <p class="question-text">${escapeHtml(q.question)}</p>
                <div class="options-container"></div>
            `;

            const optionsContainer = box.querySelector(".options-container");
            q.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "option";
                btn.dataset.value = opt;
                btn.textContent = opt;
                btn.onclick = () => {
                    if (answered) return;
                    answered = true;
                    clearInterval(countdown);
                    if (opt === q.answer) {
                        score += 1;
                        btn.classList.add('correct');
                        document.getElementById("score-box").textContent = `Điểm: ${score}`;
                    } else {
                        btn.classList.add('wrong');
                        revealAnswer();
                    }
                    setTimeout(nextQuestion, 850);
                };
                optionsContainer.appendChild(btn);
            });
            renderMath(box);
        }

        loadQuestions();
    </script>
</body>
</html>
